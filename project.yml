name: Conductor
options:
  bundleIdPrefix: com.meria
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.2"
  generateEmptyDirectories: true

packages:
  HighlightSwift:
    url: https://github.com/appstefan/HighlightSwift
    from: "1.0.0"
  swift-markdown:
    url: https://github.com/apple/swift-markdown
    from: "0.4.0"

targets:
  Conductor:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources/Assets.xcassets
    dependencies:
      - package: HighlightSwift
      - package: swift-markdown
        product: Markdown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meria.conductor
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "4.1.0"
        CURRENT_PROJECT_VERSION: 9
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Meria. All rights reserved."
        SWIFT_VERSION: "5.0"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/Conductor.entitlements
    entitlements:
      path: Sources/Conductor.entitlements
